<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>電號分佈圖</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>

  <style>
    body { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
    #map { width: 100vw; height: 100vh; background: #222; }
    
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9); z-index: 9999;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; color: white;
    }
    .spinner {
      border: 6px solid #444; border-top: 6px solid #00e676;
      border-radius: 50%; width: 50px; height: 50px;
      animation: spin 1s linear infinite; margin-bottom: 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .zone-label {
      background: rgba(255, 255, 255, 0.9); border: 2px solid #333;
      border-radius: 4px; color: #000; font-weight: bold; font-size: 14px;
      padding: 2px 6px; text-align: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
      white-space: nowrap;
    }

    .info-box { font-size: 14px; line-height: 1.6; min-width: 180px; }
    .info-btn { 
      display: block; margin-top: 10px; text-decoration: none; 
      color: white !important; background: #1DB446; padding: 8px; 
      text-align: center; border-radius: 4px; font-weight: bold;
    }
    .leaflet-control-reload {
      background: white; width: 34px; height: 34px; border-radius: 4px;
      cursor: pointer; display: flex; justify-content: center; align-items: center;
      font-size: 18px; border: 2px solid rgba(0,0,0,0.2);
    }

    /* ★ 新增：全選控制面板的樣式 */
    .master-toggle {
      background: rgba(255, 255, 255, 0.95);
      padding: 10px 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      font-size: 14px;
      color: #333;
      border: 2px solid rgba(0,0,0,0.2);
    }
    .master-toggle label {
      cursor: pointer; display: flex; align-items: center; 
      margin-top: 8px; font-weight: bold;
    }
    .master-toggle input {
      margin-right: 8px; width: 16px; height: 16px; cursor: pointer;
    }
    .master-toggle-title {
      font-weight: 900; color: #1DB446; border-bottom: 2px solid #ddd; 
      padding-bottom: 5px; margin-bottom: 5px; text-align: center;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">系統啟動中...</div>
  </div>

  <div id="map"></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
    const SUPABASE_URL = "https://fkkejsmvgsthydbmprgf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZra2Vqc212Z3N0aHlkYm1wcmdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNTYzMzEsImV4cCI6MjA4NzgzMjMzMX0.cD_JZ5NJNlNGrJ4-4Y9QtoeZxPH1WAuoD7yZsC-Eg-A";
    const COLOR_PALETTE = ['#FF0000', '#0000FF', '#008000', '#800080', '#FF8C00', '#00CED1', '#FF1493', '#8B4513', '#4682B4', '#D2691E'];
    let CONFIG = { 'OTHER': { color: 'gray', hex: '#808080', gradient: {0.4: 'gray', 1: 'black'} } };

    let map;
    let layersRef = { heat: {}, markers: {} };
    let layerControl = null;
    let colorIndex = 0; 

    async function initLiff() {
      try {
        await liff.init({ liffId: "2009264862-z2kqi1C3" });
      } catch (err) { console.error("LIFF 初始化失敗", err); }
    }

    function initMap() {
      const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'CARTO', maxZoom: 20 });
      const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM' });

      map = L.map('map', {
        center: [23.05, 120.2], zoom: 12, layers: [darkLayer], preferCanvas: true, zoomControl: false 
      });
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      window.baseMaps = { "深色模式": darkLayer, "一般街道": streetLayer };

      // 左上角：重整快取按鈕
      var ReloadControl = L.Control.extend({
        options: { position: 'topleft' },
        onAdd: function() {
          var div = L.DomUtil.create('div', 'leaflet-control-reload');
          div.innerHTML = '🔄';
          div.title = "清除快取並重新載入";
          div.onclick = function() {
            if(confirm("確定要清除手機快取並重新下載所有資料嗎？")) {
              localStorage.removeItem("power_data_cache");
              location.reload();
            }
          };
          return div;
        }
      });
      map.addControl(new ReloadControl());

      // ★ 新增右上角：批次全選控制面板
      var MasterToggleControl = L.Control.extend({
        options: { position: 'topright' },
        onAdd: function() {
          var div = L.DomUtil.create('div', 'master-toggle');
          div.innerHTML = `
            <div class="master-toggle-title">🛠️ 快速全選控制</div>
            <label><input type="checkbox" id="toggle-all-heat" checked> 🟥 顯示所有熱力圖</label>
            <label><input type="checkbox" id="toggle-all-markers"> 📍 顯示所有詳細點位</label>
          `;
          L.DomEvent.disableClickPropagation(div); // 防止點擊時穿透到地圖

          // 綁定全選/全取消事件
          let heatCheckbox = div.querySelector('#toggle-all-heat');
          let markerCheckbox = div.querySelector('#toggle-all-markers');

          heatCheckbox.addEventListener('change', function(e) {
            let isChecked = e.target.checked;
            for (let key in layersRef.heat) {
              if (isChecked) {
                if (!map.hasLayer(layersRef.heat[key])) map.addLayer(layersRef.heat[key]);
              } else {
                if (map.hasLayer(layersRef.heat[key])) map.removeLayer(layersRef.heat[key]);
              }
            }
          });

          markerCheckbox.addEventListener('change', function(e) {
            let isChecked = e.target.checked;
            for (let key in layersRef.markers) {
              if (isChecked) {
                if (!map.hasLayer(layersRef.markers[key])) map.addLayer(layersRef.markers[key]);
              } else {
                if (map.hasLayer(layersRef.markers[key])) map.removeLayer(layersRef.markers[key]);
              }
            }
          });

          return div;
        }
      });
      map.addControl(new MasterToggleControl());

      checkCacheAndLoad();
    }

    function checkCacheAndLoad() {
      // 🚨 應對百萬級資料，我們強制停用 LocalStorage 快取，直接從雲端拿！
      fetchSupabaseData();
    }

    async function fetchSupabaseData() {
      document.getElementById('loading').style.display = 'flex';
      try {
        let allData = [];
        let offset = 0;
        const limit = 10000; 
        let hasMore = true;
        
        // 🚨 設定安全上限：避免瀏覽器崩潰，我們先最多只抓 5 萬筆來測試！
        const MAX_RECORDS = 50000; 

        while (hasMore && allData.length < MAX_RECORDS) {
          document.getElementById('loading-text').innerHTML = "🌐 百萬圖資載入中... (已載入 " + allData.length + " 筆)";
          const apiUrl = SUPABASE_URL + "/rest/v1/power_data?select=power_no,civil_eng,lat,lng&limit=" + limit + "&offset=" + offset;
          const response = await fetch(apiUrl, {
            headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
          });
          const json = await response.json();
          allData = allData.concat(json);
          
          if (json.length < limit) {
            hasMore = false; 
          } else {
            offset += limit;
          }
        }

        const mappedData = allData.map(r => [r.lat, r.lng, r.power_no || "", r.civil_eng || ""]);
        
        // 🚨 註解掉快取儲存功能，防止 5MB 容量爆掉
        // const compressed = LZString.compressToUTF16(JSON.stringify(mappedData));
        // localStorage.setItem("power_data_cache", compressed);

        processData(mappedData);
      } catch (err) {
        console.error(err);
        document.getElementById('loading-text').innerHTML = "載入失敗，請檢查網路或資料量";
      }
    }

    function processData(data) {
      document.getElementById('loading-text').innerHTML = "🎨 繪製圖層中...";

      for (let key in layersRef.heat) map.removeLayer(layersRef.heat[key]);
      for (let key in layersRef.markers) map.removeLayer(layersRef.markers[key]);
      if (layerControl) map.removeControl(layerControl);

      layersRef = { heat: {}, markers: {} };
      let groups = { 'OTHER': {p:[], m:[]} }; 

      for (let i = 0; i < data.length; i++) {
        let lat = Number(data[i][0]), lng = Number(data[i][1]);
        let elecNo = String(data[i][2]).trim(), name = String(data[i][3]);
        if (!lat || !lng) continue;

        let prefix = 'OTHER';
        let match = elecNo.match(/^(\d{4})/);
        if (match) prefix = match[1];
        
        if (!groups[prefix]) {
          groups[prefix] = { p: [], m: [] };
          if (!CONFIG[prefix]) {
            let hex = COLOR_PALETTE[colorIndex % COLOR_PALETTE.length];
            CONFIG[prefix] = { hex: hex, gradient: { 0.4: hex, 1: hex } };
            colorIndex++;
          }
        }
        groups[prefix].p.push([lat, lng]);
        
        let circle = L.circleMarker([lat, lng], { radius: 6, fillColor: CONFIG[prefix].hex, color: "#fff", weight: 1, fillOpacity: 0.8 });
        circle.dataProps = { no: elecNo, name: name, lat: lat, lng: lng }; 
        circle.on('click', function(e) {
          let p = e.target.dataProps;
          let url = "https://www.google.com/maps/search/?api=1&query=" + p.lat + "," + p.lng;
          let popupContent = 
            '<div class="info-box">' +
              '<b style="color:#e74c3c; font-size:16px;">⚡ 電號：' + (p.no || '無') + '</b><br>' +
              '🏗️ 設備：' + (p.name || '無') + '<br>' +
              '<a href="' + url + '" target="_blank" class="info-btn">🚗 Google 導航</a>' +
            '</div>';
          e.target.bindPopup(popupContent).openPopup();
        });
        groups[prefix].m.push(circle);
      }

      let overlayMaps = {};
      Object.keys(groups).sort().forEach(key => {
        if (groups[key].p.length === 0) return;

        let cfg = CONFIG[key];
        let heat = L.heatLayer(groups[key].p, { radius: 25, blur: 20, maxZoom: 14, minOpacity: 0.5, gradient: cfg.gradient });

        let center = getCenter(groups[key].p);
        let lbl = null;
        if (center) {
          lbl = L.marker(center, { icon: L.divIcon({className: 'zone-label', html: key, iconSize:[50,24]}), interactive:false });
        }

        let heatGroup = lbl ? L.layerGroup([heat, lbl]) : L.layerGroup([heat]);
        layersRef.heat[key] = heatGroup;

        let displayName = (key === 'OTHER') ? '未知區 (OTHER)' : key;
        if (key !== 'OTHER') {
          map.addLayer(heatGroup);
        }
        
        overlayMaps["<span style='color:" + cfg.hex + "'>■</span> " + displayName + " 熱力圖"] = heatGroup;

        let cluster = L.markerClusterGroup({ disableClusteringAtZoom: 18, spiderfyOnMaxZoom: false, maxClusterRadius: 80 });
        cluster.addLayers(groups[key].m);
        layersRef.markers[key] = cluster;
        overlayMaps["📍 " + displayName + " 詳細點位"] = cluster;
      });

      // 讓內建選單生成在全選面板的下方
      layerControl = L.control.layers(window.baseMaps, overlayMaps, { collapsed: true }).addTo(map);
      document.getElementById('loading').style.display = 'none';
    }

    function getCenter(p) { 
      if(p.length===0) return null; 
      let la=0, lo=0; 
      for(let i=0; i<p.length; i++){ la+=p[i][0]; lo+=p[i][1]; } 
      return [la/p.length, lo/p.length]; 
    }

    window.onload = function() { initMap(); initLiff(); };
  </script>
</body>
</html>
