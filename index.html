<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>電號分佈圖</title>
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>

  <style>
    body { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
    #map { width: 100vw; height: 100vh; background: #222; }
    
    /* 載入畫面 */
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.9); z-index: 9998;
      display: none; flex-direction: column;
      justify-content: center; align-items: center; color: white;
    }
    .spinner {
      border: 6px solid #444; border-top: 6px solid #00e676;
      border-radius: 50%; width: 50px; height: 50px;
      animation: spin 1s linear infinite; margin-bottom: 15px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* 彈出選單樣式 */
    #prefix-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85); z-index: 10000;
      display: flex; justify-content: center; align-items: center;
    }
    .modal-content {
      background: #fff; width: 90%; max-width: 400px;
      border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      max-height: 80vh; display: flex; flex-direction: column;
    }
    .modal-header { 
      font-size: 16px; font-weight: bold; margin-bottom: 10px; color: #1DB446; 
      border-bottom: 2px solid #eee; padding-bottom: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .prefix-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      overflow-y: auto; padding: 10px 0; margin-bottom: 15px;
    }
    .prefix-label {
      background: #f0f2f5; padding: 8px 5px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
      cursor: pointer; border: 1px solid #ddd; font-weight: bold; color: #333;
    }
    .prefix-label input { margin-right: 5px; width: 18px; height: 18px; }
    .modal-footer { display: flex; justify-content: space-between; gap: 10px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
    .btn-all { background: #e0e0e0; color: #333; }
    .btn-submit { background: #1DB446; color: white; }
    .btn-rescan { background: #f0f2f5; border: 1px solid #ddd; border-radius: 4px; padding: 4px 8px; font-size: 12px; cursor: pointer; color: #555; font-weight: bold; }

    /* 地圖元件樣式 */
    .zone-label { background: rgba(255, 255, 255, 0.9); border: 2px solid #333; border-radius: 4px; color: #000; font-weight: bold; font-size: 14px; padding: 2px 6px; text-align: center; box-shadow: 2px 2px 5px rgba(0,0,0,0.5); white-space: nowrap; }
    .info-box { font-size: 14px; line-height: 1.6; min-width: 180px; }
    .info-btn { display: block; margin-top: 10px; text-decoration: none; color: white !important; background: #1DB446; padding: 8px; text-align: center; border-radius: 4px; font-weight: bold; }
    .leaflet-control-reload { background: white; width: 34px; height: 34px; border-radius: 4px; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 18px; border: 2px solid rgba(0,0,0,0.2); }
    .master-toggle { background: rgba(255, 255, 255, 0.95); padding: 10px 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); font-size: 14px; color: #333; border: 2px solid rgba(0,0,0,0.2); }
    .master-toggle label { cursor: pointer; display: flex; align-items: center; margin-top: 8px; font-weight: bold; }
    .master-toggle input { margin-right: 8px; width: 16px; height: 16px; cursor: pointer; }
    .master-toggle-title { font-weight: 900; color: #1DB446; border-bottom: 2px solid #ddd; padding-bottom: 5px; margin-bottom: 5px; text-align: center; }
  </style>
</head>
<body>

  <div id="prefix-modal">
    <div class="modal-content">
      <div class="modal-header">
        <span>⚡ 選擇要載入的區段</span>
        <span>⛔ 不要全選會出錯</span>
        <button class="btn-rescan" onclick="forceRescan()">🔄 重新掃描</button>
      </div>
      <div class="prefix-grid" id="prefix-container">
        </div>
      <div class="modal-footer">
        <button class="btn btn-all" onclick="toggleAllPrefixes()">全選 / 清除</button>
        <button class="btn btn-submit" onclick="startLoadingData()">🚀 確認載入</button>
      </div>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">系統啟動中...</div>
  </div>

  <div id="map"></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
    // Supabase 設定
    // ==========================================
    // ★ 雙主機自動備援設定 (Active-Standby Auto Failover) ★
    // ==========================================
    const DB_CONFIGS = [
      {
        name: "新主機 (主力)",
        url: "https://bvvmdbteacslgjkpdkuh.supabase.co",
        key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ2dm1kYnRlYWNzbGdqa3Bka3VoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NzY4NTAsImV4cCI6MjA4ODA1Mjg1MH0.fshL0p1hoBmH1E8ohP_Tpfs51Bh7G4pJL5BjgHiicI8"
      },
      {
        name: "舊主機 (備援)",
        url: "https://fkkejsmvgsthydbmprgf.supabase.co", 
        key: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZra2Vqc212Z3N0aHlkYm1wcmdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyNTYzMzEsImV4cCI6MjA4NzgzMjMzMX0.cD_JZ5NJNlNGrJ4-4Y9QtoeZxPH1WAuoD7yZsC-Eg-A" // ⚠️ 記得貼上舊主機的鑰匙！
      }
    ];

    // ★ 核心切換引擎：負責幫網頁去敲門，A門不開就秒切B門
    async function fetchWithFailover(apiPath, method = 'GET') {
      let lastError;
      for (let i = 0; i < DB_CONFIGS.length; i++) {
        let db = DB_CONFIGS[i];
        try {
          let response = await fetch(db.url + apiPath, {
            method: method,
            headers: { 
              "apikey": db.key, 
              "Authorization": "Bearer " + db.key,
              "Content-Type": "application/json"
            }
          });
          if (response.ok) {
            return await response.json(); // 成功！馬上把資料送回去
          } else {
            console.warn(`⚠️ [${db.name}] 狀態異常 (${response.status})，自動切換下一台...`);
            lastError = new Error("伺服器狀態異常: " + response.status);
          }
        } catch (err) {
          console.warn(`💥 [${db.name}] 連線失敗，自動切換下一台...`);
          lastError = err;
        }
      }
      throw new Error("❌ 所有主機皆無法連線，請稍後再試。"); // 兩台都掛了才會走到這
    }
    const COLOR_PALETTE = ['#FF0000', '#0000FF', '#008000', '#800080', '#FF8C00', '#00CED1', '#FF1493', '#8B4513', '#4682B4', '#D2691E'];
    let CONFIG = { 'OTHER': { color: 'gray', hex: '#808080', gradient: {0.4: 'gray', 1: 'black'} } };

    let map;
    let layersRef = { heat: {}, markers: {} };
    let layerControl = null;
    let colorIndex = 0; 
    let isAllSelected = false;

    // LIFF 初始化
    async function initLiff() {
      try { await liff.init({ liffId: "2009264862-z2kqi1C3" }); } catch (err) { console.error("LIFF 初始化失敗", err); }
    }

    // 地圖初始化
    function initMap() {
      const darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'CARTO', maxZoom: 20 });
      const streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM' });

      map = L.map('map', { center: [23.05, 120.2], zoom: 12, layers: [darkLayer], preferCanvas: true, zoomControl: false });
      L.control.zoom({ position: 'bottomright' }).addTo(map);
      window.baseMaps = { "深色模式": darkLayer, "一般街道": streetLayer };

      // ★ 左上角重整按鈕 (點擊清除圖層記憶並重新選取)
      var ReloadControl = L.Control.extend({
        options: { position: 'topleft' },
        onAdd: function() {
          var div = L.DomUtil.create('div', 'leaflet-control-reload');
          div.innerHTML = '🔄';
          div.title = "重新選擇區段";
          div.onclick = function() { 
            localStorage.removeItem('last_selected_prefixes'); // 清除勾選記憶
            location.reload(); 
          }; 
          return div;
        }
      });
      map.addControl(new ReloadControl());

      // 右上角全選控制面板
      var MasterToggleControl = L.Control.extend({
        options: { position: 'topright' },
        onAdd: function() {
          var div = L.DomUtil.create('div', 'master-toggle');
div.innerHTML = `<div class="master-toggle-title">🛠️ 快速全選控制</div>
            <label><input type="checkbox" id="toggle-all-heat" checked> 🟥 顯示所有熱力圖</label>
            <label><input type="checkbox" id="toggle-all-markers"> 📍 顯示所有詳細點位</label>
            <hr style="margin: 8px 0; border-top: 1px solid #ddd;">
            <button onclick="loadGodModeLabels()" style="width:100%; padding:8px; background:#1DB446; color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">🌍全區標籤</button>`;
          L.DomEvent.disableClickPropagation(div);

          div.querySelector('#toggle-all-heat').addEventListener('change', function(e) {
            for (let key in layersRef.heat) { e.target.checked ? map.addLayer(layersRef.heat[key]) : map.removeLayer(layersRef.heat[key]); }
          });
          div.querySelector('#toggle-all-markers').addEventListener('change', function(e) {
            for (let key in layersRef.markers) { e.target.checked ? map.addLayer(layersRef.markers[key]) : map.removeLayer(layersRef.markers[key]); }
          });
          return div;
        }
      });
      map.addControl(new MasterToggleControl());

      // 開始讀取前 4 碼清單
      buildPrefixModal();
    }

    // ==========================================
    // 智慧型載入區段清單 (結合快取與 RPC)
    // ==========================================
    async function buildPrefixModal() {
      const container = document.getElementById('prefix-container');

      // 1. 檢查快取
      const cachedPrefixes = localStorage.getItem('power_prefixes_cache');
      if (cachedPrefixes) {
        renderPrefixes(JSON.parse(cachedPrefixes));
        return;
      }

      // 2. 如果沒快取，呼叫 Supabase 進行全表掃描
      container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: #1DB446; padding: 20px;">🔄 初次啟動：正在掃描資料 (約需 5~10 秒)...</div>';

      try {
// 呼叫智慧切換引擎去拿清單
        const data = await fetchWithFailover("/rest/v1/rpc/get_unique_prefixes", "POST");
        const prefixes = data.map(item => item.prefix).filter(Boolean);

        // 3. 寫入快取並渲染
        localStorage.setItem('power_prefixes_cache', JSON.stringify(prefixes));
        renderPrefixes(prefixes);

      } catch (err) {
        container.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: red;">❌ 讀取區段清單失敗，請檢查網路。</div>';
        console.error("讀取清單失敗:", err);
      }
    }

    // ==========================================
    // 將清單畫成核取方塊，並檢查是否有「上次的記憶」
    // ==========================================
    function renderPrefixes(prefixes) {
      const container = document.getElementById('prefix-container');
      container.innerHTML = ''; 
      
      // 🧠 1. 讀取大腦裡「上次勾選了哪些區段」
      let lastSelected = [];
      try {
        const saved = localStorage.getItem('last_selected_prefixes');
        if (saved) lastSelected = JSON.parse(saved);
      } catch (e) {}

      // 2. 產生核取方塊
      prefixes.forEach(prefix => {
        const label = document.createElement('label');
        label.className = 'prefix-label';
        // 如果這個區段在上次的記憶裡，就幫它加上 checked 自動打勾
        const isChecked = lastSelected.includes(prefix) ? 'checked' : '';
        label.innerHTML = `<input type="checkbox" value="${prefix}" ${isChecked}> ${prefix}`;
        container.appendChild(label);
      });

      // 🚀 3. 如果有記憶，直接幫使用者自動按下「確認載入」！
      if (lastSelected.length > 0) {
        startLoadingData();
      }
    }

    // 手動強制清除快取並重新掃描資料庫
    async function forceRescan() {
      if(confirm("確定要重新掃描資料庫中的最新區段嗎？\n(這將花費約 5~10 秒鐘)")) {
        localStorage.removeItem('power_prefixes_cache'); 
        document.getElementById('prefix-container').innerHTML = ''; 
        await buildPrefixModal(); 
      }
    }

    // 全選/清除按鈕
    function toggleAllPrefixes() {
      isAllSelected = !isAllSelected;
      const checkboxes = document.querySelectorAll('#prefix-container input[type="checkbox"]');
      checkboxes.forEach(cb => cb.checked = isAllSelected);
    }

    // ==========================================
    // 依據勾選區段下載資料 (★ 升級為逐一區段獨立下載版)
    // ==========================================
    async function startLoadingData() {
      const checkboxes = document.querySelectorAll('#prefix-container input[type="checkbox"]:checked');
      const selectedPrefixes = Array.from(checkboxes).map(cb => cb.value);

      if (selectedPrefixes.length === 0) {
        alert("請至少選擇一個區段！");
        return;
      }

      // 💾 儲存記憶
      localStorage.setItem('last_selected_prefixes', JSON.stringify(selectedPrefixes));

      document.getElementById('prefix-modal').style.display = 'none';
      document.getElementById('loading').style.display = 'flex';

      try {
        let allData = [];
        const limit = 10000;

        // ★ 核心魔法：不再把多個條件塞成一包！我們「一個一個區段」獨立向資料庫要資料
        for (let i = 0; i < selectedPrefixes.length; i++) {
          let prefix = selectedPrefixes[i];
          let offset = 0;
          let hasMore = true;

          while (hasMore) {
            // 動態顯示正在下載哪一個區段，讓使用者看見進度
            document.getElementById('loading-text').innerHTML = `🌐 下載區段 [${prefix}] 中...<br>(目前累計 ${allData.length} 筆)`;
            
// 呼叫智慧切換引擎去拿座標 (注意這裡只給網址後半段的 Path)
            const apiPath = `/rest/v1/power_data?power_no=like.${prefix}*&select=power_no,civil_eng,lat,lng&limit=${limit}&offset=${offset}&order=power_no.asc`;
            
            const json = await fetchWithFailover(apiPath, "GET");
            allData = allData.concat(json);
            
            // 判斷這個單一區段是不是已經抓完了
            if (json.length < limit) {
              hasMore = false; // 抓完了，迴圈會進入下一個 prefix
            } else {
              offset += limit; // 還沒抓完，繼續抓這個 prefix 的下一頁
            }
          }
        }

        // 全部的區段都平安抓完後，統一交給地圖去畫
        document.getElementById('loading-text').innerHTML = "🎨 資料下載完成，準備繪製地圖...";
        const mappedData = allData.map(r => [r.lat, r.lng, r.power_no || "", r.civil_eng || ""]);
        processData(mappedData);

      } catch (err) {
        console.error(err);
        document.getElementById('loading-text').innerHTML = "載入失敗，請檢查網路或重新整理";
      }
    }

    // ==========================================
    // 繪製地圖與叢集
    // ==========================================
    function processData(data) {
      document.getElementById('loading-text').innerHTML = "🎨 繪製圖層中...";

      for (let key in layersRef.heat) map.removeLayer(layersRef.heat[key]);
      for (let key in layersRef.markers) map.removeLayer(layersRef.markers[key]);
      if (layerControl) map.removeControl(layerControl);

      layersRef = { heat: {}, markers: {} };
      let groups = { 'OTHER': {p:[], m:[]} }; 

      for (let i = 0; i < data.length; i++) {
        let lat = Number(data[i][0]), lng = Number(data[i][1]);
        let elecNo = String(data[i][2]).trim(), name = String(data[i][3]);
        if (!lat || !lng) continue;

        let prefix = 'OTHER';
        let match = elecNo.match(/^(\d{4})/);
        if (match) prefix = match[1];
        
        if (!groups[prefix]) {
          groups[prefix] = { p: [], m: [] };
          if (!CONFIG[prefix]) {
            let hex = COLOR_PALETTE[colorIndex % COLOR_PALETTE.length];
            CONFIG[prefix] = { hex: hex, gradient: { 0.4: hex, 1: hex } };
            colorIndex++;
          }
        }
        groups[prefix].p.push([lat, lng]);
        
        let circle = L.circleMarker([lat, lng], { radius: 6, fillColor: CONFIG[prefix].hex, color: "#fff", weight: 1, fillOpacity: 0.8 });
        circle.dataProps = { no: elecNo, name: name, lat: lat, lng: lng }; 
        circle.on('click', function(e) {
          let p = e.target.dataProps;
          let url = "https://www.google.com/maps/search/?api=1&query=" + p.lat + "," + p.lng;
          let popupContent = 
            '<div class="info-box">' +
              '<b style="color:#e74c3c; font-size:16px;">⚡ 電號：' + (p.no || '無') + '</b><br>' +
              '🏗️ 設備：' + (p.name || '無') + '<br>' +
              '<a href="' + url + '" target="_blank" class="info-btn">🚗 Google 導航</a>' +
            '</div>';
          e.target.bindPopup(popupContent).openPopup();
        });
        groups[prefix].m.push(circle);
      }

      let overlayMaps = {};
      Object.keys(groups).sort().forEach(key => {
        if (groups[key].p.length === 0) return;

        let cfg = CONFIG[key];
        let heat = L.heatLayer(groups[key].p, { radius: 25, blur: 20, maxZoom: 14, minOpacity: 0.5, gradient: cfg.gradient });

        let center = getCenter(groups[key].p);
        let lbl = null;
        if (center) {
          lbl = L.marker(center, { icon: L.divIcon({className: 'zone-label', html: key, iconSize:[50,24]}), interactive:false });
        }

        let heatGroup = lbl ? L.layerGroup([heat, lbl]) : L.layerGroup([heat]);
        layersRef.heat[key] = heatGroup;

        let displayName = (key === 'OTHER') ? '未知區 (OTHER)' : key;
        if (key !== 'OTHER') {
          map.addLayer(heatGroup);
        }
        
        overlayMaps["<span style='color:" + cfg.hex + "'>■</span> " + displayName + " 熱力圖"] = heatGroup;

        let cluster = L.markerClusterGroup({ disableClusteringAtZoom: 18, spiderfyOnMaxZoom: false, maxClusterRadius: 80 });
        cluster.addLayers(groups[key].m);
        layersRef.markers[key] = cluster;
        overlayMaps["📍 " + displayName + " 詳細點位"] = cluster;
      });

      layerControl = L.control.layers(window.baseMaps, overlayMaps, { collapsed: true }).addTo(map);
      document.getElementById('loading').style.display = 'none';
    }

    function getCenter(p) { 
      if(p.length===0) return null; 
      let la=0, lo=0; 
      for(let i=0; i<p.length; i++){ la+=p[i][0]; lo+=p[i][1]; } 
      return [la/p.length, lo/p.length]; 
    }
    
    window.onload = function() { initMap(); initLiff(); };

// ==========================================
    // ★ 上帝視角：讀取實體化視圖 + 防重疊標籤叢集
    // ==========================================
    let godModeCluster = null; // 用來存放防重疊的標籤群組

    async function loadGodModeLabels() {
      const btn = document.querySelector('button[onclick="loadGodModeLabels()"]');
      let originalText = btn.innerHTML;

      // 防止重複點擊
      if (btn.innerHTML.includes("計算中")) return;
      btn.innerHTML = "⏳ 雲端計算中...";
      btn.style.background = "#f39c12";

      // 1. 如果地圖上已經有上帝視角圖層，就先清空它（避免按第二次疊加）
      if (godModeCluster) {
        map.removeLayer(godModeCluster);
      }

      // 2. 建立一個「防重疊叢集」
      godModeCluster = L.markerClusterGroup({
        maxClusterRadius: 60,         // 距離 60 pixel 內的標籤會自動合併
        disableClusteringAtZoom: 14,  // 當地圖放大到 14 級時，強制全部分開不合併
        spiderfyOnMaxZoom: true       // 太擠的時候會像蜘蛛網一樣彈開
      });

      try {
        // 3. 向 Supabase 的實體化視圖要資料 (瞬間回傳)
        const data = await fetchWithFailover("/rest/v1/power_prefix_centers?select=*", "GET");
        let bounds = [];

        // 4. 把資料做成標籤，塞進防重疊叢集裡
        data.forEach(row => {
          let lbl = L.marker([row.center_lat, row.center_lng], { 
            icon: L.divIcon({
              className: 'zone-label', 
              html: `<span style="color:#e74c3c; font-weight:900; font-size:16px;">${row.prefix}</span><br><span style="font-size:11px; color:#555;">(${row.total_points} 筆)</span>`, 
              iconSize: [60, 45],
              iconAnchor: [30, 22] // 設定錨點，讓標籤完美置中
            })
          });
          
          godModeCluster.addLayer(lbl); // 注意：這裡是加到 Cluster 裡，不是直接加到 map
          bounds.push([row.center_lat, row.center_lng]);
        });

        // 5. 將整個叢集加到地圖上
        map.addLayer(godModeCluster);

        btn.innerHTML = "✅ 全區標籤已載入";
        btn.style.background = "#2c3e50";
        
        // 6. 視角自動縮放，漂亮地包住所有的標籤
        if(bounds.length > 0) {
          map.fitBounds(bounds, { padding: [50, 50] });
        }

      } catch (err) {
        console.error("載入全區標籤失敗:", err);
        alert("載入失敗，請檢查網路連線。");
        btn.innerHTML = originalText;
        btn.style.background = "#1DB446";
      }
    }
  </script>
</body>
</html>
